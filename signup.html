<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DANK Cannabis Club — สมัครสมาชิก</title>
  <link rel="stylesheet" href="assets/css/auth.css">

  <!-- 1. Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 2. EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <!-- 3. Credentials -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/emailjs-config.js"></script>
  <!-- 4. Supabase client + Auth -->
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/auth.js"></script>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card" style="max-width:460px">

    <!-- Brand logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">🌿</div>
      <div class="auth-logo-title"><span>DANK</span> Cannabis Club</div>
      <div class="auth-logo-sub">AI Command Center</div>
    </div>

    <div class="auth-title">สร้างบัญชีพนักงาน</div>
    <div class="auth-subtitle">สำหรับผู้จัดการและพนักงาน DANK เท่านั้น</div>

    <!-- Alert -->
    <div id="authAlert" class="auth-alert" role="alert">
      <span id="authAlertIcon">⚠️</span>
      <span id="authAlertMsg"></span>
    </div>

    <!-- Signup form -->
    <form class="auth-form" id="signupForm" novalidate onsubmit="handleSignup(event)">

      <!-- Full Name -->
      <div class="form-group">
        <label class="form-label" for="fullNameInput">ชื่อ-นามสกุล <span style="color:var(--red)">*</span></label>
        <div class="form-input-wrap">
          <input id="fullNameInput" class="form-input" type="text"
            placeholder="เช่น สมชาย ใจดี" autocomplete="name" required>
        </div>
      </div>

      <!-- Username -->
      <div class="form-group">
        <label class="form-label" for="usernameInput">Username <span style="color:var(--red)">*</span></label>
        <div class="form-input-wrap">
          <input id="usernameInput" class="form-input" type="text"
            placeholder="เช่น somchai99 (a-z, 0-9, _)" autocomplete="username" required>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="emailInput">อีเมล <span style="color:var(--red)">*</span></label>
        <div class="form-input-wrap">
          <input id="emailInput" class="form-input" type="email"
            placeholder="your@dank.com" autocomplete="email" required>
        </div>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label class="form-label" for="phoneInput">เบอร์โทรศัพท์</label>
        <div class="form-input-wrap">
          <input id="phoneInput" class="form-input" type="tel"
            placeholder="0812345678" autocomplete="tel">
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="passwordInput">รหัสผ่าน <span style="color:var(--red)">*</span></label>
        <div class="form-input-wrap">
          <input id="passwordInput" class="form-input has-icon" type="password"
            placeholder="อย่างน้อย 6 ตัวอักษร" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" id="pwToggle1"
            onclick="togglePassword('passwordInput','pwToggle1')" aria-label="แสดง/ซ่อนรหัสผ่าน">👁️</button>
        </div>
        <!-- Strength bar -->
        <div style="margin-top:6px">
          <div style="background:var(--bg2);border-radius:4px;height:4px;overflow:hidden">
            <div id="strengthBar" style="height:100%;width:0;border-radius:4px;transition:all .3s"></div>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px">
            ความแข็งแรง: <span id="strengthLabel">—</span>
          </div>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label" for="confirmPasswordInput">ยืนยันรหัสผ่าน <span style="color:var(--red)">*</span></label>
        <div class="form-input-wrap">
          <input id="confirmPasswordInput" class="form-input has-icon" type="password"
            placeholder="กรอกรหัสผ่านอีกครั้ง" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" id="pwToggle2"
            onclick="togglePassword('confirmPasswordInput','pwToggle2')" aria-label="แสดง/ซ่อนรหัสผ่าน">👁️</button>
        </div>
      </div>

      <!-- Terms checkbox -->
      <label class="form-check" style="margin-top:4px">
        <input type="checkbox" id="agreeCheck">
        <span style="font-size:12px;color:var(--text2)">
          ฉันยอมรับ <span style="color:var(--green);cursor:pointer">เงื่อนไขการใช้งาน</span> ของ DANK Cannabis Club
        </span>
      </label>

      <!-- Submit -->
      <button type="submit" class="btn-auth" id="signupBtn">
        <div class="spinner" id="signupSpinner"></div>
        <span class="btn-label" id="signupBtnLabel">🌿 สร้างบัญชี</span>
      </button>

    </form>

    <!-- Already have account -->
    <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--text3)">
      มีบัญชีอยู่แล้ว?
      <a href="login.html" style="color:var(--green);text-decoration:none;font-weight:600"> เข้าสู่ระบบ</a>
    </div>

    <div class="auth-footer">
      © 2026 DANK Cannabis Club · All rights reserved<br>
      <span style="color:#2d4a2d">Protected by DANK Auth v2.0 · Supabase</span>
    </div>

  </div>
</div>

<script src="assets/js/signup.js"></script>
</body>
</html>
